<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Booth Test</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #000;
      color: #fff;
    }
    #qrcode canvas {
      margin-top: 20px;
    }
    .box {
      margin-top: 30px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>Escaneá para pagar</h1>

<div id="qrcode"></div>

<div class="box">
  <p>Polling count: <span id="count">0</span></p>
  <pre id="response"></pre>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
  const paymentLink = "https://mpago.li/2sTSLcb";

  // Generar QR
  QRCode.toCanvas(document.getElementById('qrcode'), paymentLink, {
    width: 300
  });

  let count = 0;
  const maxAttempts = 3;

  const interval = setInterval(async () => {
    count++;
    document.getElementById("count").innerText = count;

    try {
      const res = await fetch("https://jsonplaceholder.typicode.com/todos/1");
      const data = await res.json();

      document.getElementById("response").innerText =
        JSON.stringify(data, null, 2);

    } catch (e) {
      document.getElementById("response").innerText = "Error en fetch";
    }

    if (count >= maxAttempts) {
      clearInterval(interval);

      document.getElementById("response").innerText +=
        "\n\nRedirecting to Sparkbooth...";

      setTimeout(() => {
        window.location.href = "sparkbooth://success";
      }, 1500);
    }

  }, 2000);
</script>

</body>
</html>
